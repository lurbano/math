<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci. Not.</title>
    <style>
        div { 
            border: 5px inset grey;
            margin: 5px;
            padding: 5px;
            width: fit-content;
        }
    </style>
</head>
<body>

Round answers to three significant figures.

<div id="largeNums">
    Large numbers (|x| ≥ 10) <br>
    <input type="button" id="genLargeNum" value="Generate Large Number">
    <span id="largeNum"></span><br>
    <input type="button" id="getLargeNumAns" value="Get Answer">
    <span id="largeNumAns"></span>

</div>

<div id="smallNums">
    Small numbers (-1 < x < 1) <br>
    <input type="button" id="genSmallNum" value="Generate Small Number">
    <span id="smallNum"></span><br>
    <input type="button" id="getSmallNumAns" value="Get Answer">
    <span id="smallNumAns"></span>

</div>


    
</body>

<script>




    class sciNotation{
        constructor(val=0){
            this.val = val;
        }

        generateLargeNumber(expMax=10, sigFigs=-1){

            let coeff = Math.random()*10;
            let exponent = Math.floor(Math.random()*(expMax-2))+2;

            let nSigFig = 3;

            console.log(`${coeff} × 10^${exponent}`);

            this.val = coeff*10**exponent;
            if (sigFigs === -1){
                this.val = Math.floor(this.val);
            }
            
            return this.val;

        }

        generateSmallNumber(expMax=10, sigFigs=6){
            let coeff = Math.random().toFixed(sigFigs);
            let exponent = -Math.floor(Math.random()*expMax);
            console.log("exp", exponent, sigFigs-exponent)

            console.log(`${coeff} × 10^${exponent}`);

            //this.val = coeff*10**exponent.toFixed(sigFigs-exponent);

            let v = Math.round(coeff*10**exponent * 10**(sigFigs-exponent))/(10**(sigFigs-exponent))
            console.log("v", v)
            this.val = v;
            //this.val = this.val.toFixed(sigFigs-exponent)
            console.log("small val", this.val)
            return this.val;
        }

        toHTML(sigFigs=3){
            let numStr = this.val.toExponential();
            let coeff = Number(numStr.split("e")[0]);
            let exponent = Number(numStr.split("e")[1].replace("+",""));
            let outStr = `${coeff.toFixed(sigFigs-1)} × 10 <sup>${exponent}</sup>`;
            return outStr;
        }
        

    }

    largeNum = new sciNotation();
    smallNum = new sciNotation();

    document.getElementById("genLargeNum").addEventListener("click", function(){
        let qSpace = document.getElementById("largeNum");
        let aSpace = document.getElementById("largeNumAns")
        
        largeNum.generateLargeNumber(expMax=5); 
        qSpace.innerHTML = largeNum.val.toFixed(0);

    })

    document.getElementById("getLargeNumAns").addEventListener('click', function(){
        let qSpace = document.getElementById("largeNum");
        let aSpace = document.getElementById("largeNumAns")
        
        aSpace.innerHTML = largeNum.toHTML();
    })

    document.getElementById("genSmallNum").addEventListener("click", function(){
        let qSpace = document.getElementById("smallNum");
        let aSpace = document.getElementById("smallNumAns")
        
        smallNum.generateSmallNumber(expMax=5);
        console.log("smallNum", smallNum);

        aSpace.innerHTML = "";
        qSpace.innerHTML = smallNum.val;

    })

    document.getElementById("getSmallNumAns").addEventListener('click', function(){
        let qSpace = document.getElementById("smallNum");
        let aSpace = document.getElementById("smallNumAns")
        
        aSpace.innerHTML = smallNum.toHTML();
    })




</script>
</html>
